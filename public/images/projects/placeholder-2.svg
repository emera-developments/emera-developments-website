<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a843;stop-opacity:0.3"/>
      <stop offset="60%" style="stop-color:#f5e6c8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e8d5b0;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#sky)"/>
  <!-- Ground/road -->
  <rect x="0" y="470" width="800" height="130" fill="#c8b89a"/>
  <rect x="0" y="465" width="800" height="8" fill="#b0a08a"/>
  <!-- Main villa -->
  <rect x="150" y="280" width="500" height="190" fill="#f0e8d8"/>
  <!-- Roof -->
  <polygon points="130,280 400,160 670,280" fill="#c8a870"/>
  <polygon points="150,280 400,175 650,280" fill="#d4b880"/>
  <!-- Door -->
  <rect x="355" y="370" width="90" height="100" fill="#8b6914" rx="8"/>
  <circle cx="400" cy="420" r="5" fill="#c49a2e"/>
  <!-- Windows -->
  <rect x="180" y="310" width="80" height="70" fill="#87ceeb" rx="4"/>
  <rect x="540" y="310" width="80" height="70" fill="#87ceeb" rx="4"/>
  <rect x="180" y="315" width="80" height="2" fill="#c8a870"/>
  <rect x="220" y="310" width="2" height="70" fill="#c8a870"/>
  <rect x="540" y="315" width="80" height="2" fill="#c8a870"/>
  <rect x="580" y="310" width="2" height="70" fill="#c8a870"/>
  <!-- Columns -->
  <rect x="330" y="250" width="20" height="130" fill="#e8dcc8"/>
  <rect x="450" y="250" width="20" height="130" fill="#e8dcc8"/>
  <!-- Trees -->
  <rect x="90" y="400" width="12" height="70" fill="#6b4f2a"/>
  <ellipse cx="96" cy="380" rx="35" ry="45" fill="#2d6a1e"/>
  <ellipse cx="96" cy="370" rx="28" ry="38" fill="#3a8528"/>
  <rect x="690" y="400" width="12" height="70" fill="#6b4f2a"/>
  <ellipse cx="696" cy="380" rx="35" ry="45" fill="#2d6a1e"/>
  <ellipse cx="696" cy="370" rx="28" ry="38" fill="#3a8528"/>
  <!-- Path to door -->
  <rect x="370" y="470" width="60" height="30" fill="#d4c4a8"/>
  <!-- Gold accent -->
  <rect x="0" y="463" width="800" height="3" fill="#c49a2e" opacity="0.5"/>
  <!-- Label -->
  <text x="400" y="545" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#6b4f2a" opacity="0.8">EMERA DEVELOPMENTS</text>
</svg>
